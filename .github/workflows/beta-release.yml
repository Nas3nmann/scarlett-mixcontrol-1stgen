# Build Scarlett MixControl on macOS and publish a GitHub pre-release (beta)
# with Scarlett.MixControl.app.zip attached.
#
# How to get a beta build:
#   1. GitHub → Actions → "Beta release" → Run workflow (optional custom tag)
#   2. Or push a tag:  git tag v0.2.0-beta.1 && git push origin v0.2.0-beta.1
#
# Download: repo → Releases → latest pre-release → Scarlett.MixControl.app.zip

name: Beta release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0-beta.1). Leave empty to auto-generate."
        required: false
        type: string
  push:
    tags:
      - "v*-beta*"
      - "v*beta*"

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Show toolchain
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Build .app and zip
        run: ./scripts/make-release.sh

      - name: Compute checksum
        id: checksum
        run: |
          SHA=$(shasum -a 256 "build/Scarlett.MixControl.app.zip" | awk '{print $1}')
          SIZE=$(stat -f '%z' "build/Scarlett.MixControl.app.zip")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size_kb=$((SIZE / 1024))" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v0.2.0-beta.${{ github.run_number }}"
          fi
          # GitHub release tags must not contain spaces.
          if [[ "$TAG" =~ [[:space:]] ]]; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Scarlett MixControl ${{ steps.version.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: build/Scarlett.MixControl.app.zip
          body: |
            ## Beta build (macOS 14+)

            1. Download **`Scarlett.MixControl.app.zip`** below.
            2. Unzip and drag **Scarlett MixControl.app** to `/Applications`.
            3. **First launch:** right-click the app → **Open** → confirm (ad-hoc codesign, not notarized).
               Or: `xattr -dr com.apple.quarantine "/Applications/Scarlett MixControl.app"`

            ### Supported hardware (this branch)
            - Scarlett **8i6** (1st gen) — tested
            - Scarlett **18i8** (1st gen) — beta support

            ### Build info
            | | |
            |---|---|
            | Commit | `${{ github.sha }}` |
            | Workflow run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | ZIP size | ${{ steps.checksum.outputs.size_kb }} KB |
            | SHA-256 | `${{ steps.checksum.outputs.sha256 }}` |
